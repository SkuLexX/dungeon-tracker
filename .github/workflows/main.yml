name: Keep Render App Alive

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch:       # allow manual run

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render app
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://dungeon-tracker.onrender.com)
          echo "Status: $status"
